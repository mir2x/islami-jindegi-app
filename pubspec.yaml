name: native_app
description: Islami Jindegi Native App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # application
  flutter_dotenv: ^5.0.2

  # state management
  flutter_riverpod: ^1.0.4
  path_provider: ^2.0.11

  # routing
  qlevar_router: ^1.6.2

  # data
  flutter_data: ^1.4.7
  flutter_data_json_api_adapter: ^0.7.1
  json_annotation: ^4.6.0
  equatable: ^2.0.5

  # widgets
  carousel_slider: ^4.1.1

  # text
  flutter_html: ^3.0.0-alpha.5
  intl: ^0.17.0

  # assets
  cupertino_icons: ^1.0.2
  flutter_svg: ^1.1.1+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

  build_runner: ^2.2.0

  json_serializable: ^6.3.1
  faker: ^2.0.0

  flutter_launcher_icons: "^0.10.0"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/logos/
    - assets/images/icons/

  fonts:
    - family: bangla/solaimanlipi
      fonts:
        - asset: assets/fonts/solaimanlipi.ttf

    - family: bangla/siyamrupali
      fonts:
        - asset: assets/fonts/siyamrupali.ttf

    - family: bangla/kalpurush
      fonts:
        - asset: assets/fonts/kalpurush.ttf

    - family: arabic/al-qalam
      fonts:
        - asset: assets/fonts/al-qalam-quran-majeed.ttf

    - family: arabic/al-qalam-kolkatta
      fonts:
        - asset: assets/fonts/al-qalam-kolkatta-quranic-regular.ttf

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logos/logo-icon.png"
