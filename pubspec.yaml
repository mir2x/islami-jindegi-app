name: native_app
description: Islami Jindegi Native App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # application
  flutter_dotenv: ^5.0.2

  # state management
  flutter_riverpod: ^2.1.3

  # routing
  qlevar_router: ^1.7.1

  # data
  flutter_data: ^1.5.4
  flutter_data_json_api_adapter: ^0.8.0
  equatable: ^2.0.5

  # local db
  drift: ^2.1.0
  sqlite3_flutter_libs: ^0.5.0
  json_api: ^5.3.0

  # form
  date_field: ^3.0.2
  dropdown_button2: ^1.9.2
  idkit_inputformatters: ^0.0.1
  easy_debounce: ^2.0.2+1

  # widgets
  infinite_scroll_pagination: ^3.2.0
  carousel_slider: ^4.1.1
  audioplayers: ^1.1.0
  pdfx: ^2.3.0

  # text
  flutter_html:
    git:
      url: https://github.com/Sub6Resources/flutter_html
      ref: master
  intl: ^0.17.0
  inflection3: ^0.5.3+2
  recase: ^4.1.0

  # platform
  permission_handler: ^10.2.0
  path_provider: ^2.0.12
  shared_preferences: ^2.0.16
  geolocator: ^9.0.2
  connectivity_plus: ^3.0.3

  # http
  dio: ^5.0.0

  # builder
  json_annotation: ^4.7.0

  # utility
  path: '^1.8.2'

  # extensions
  collection: ^1.16.0

  # islamic
  hijri: ^3.0.0
  adhan: ^2.0.0-nullsafety.2

  # assets
  flutter_svg: ^1.1.1+1
  transparent_image: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

  build_runner: ^2.3.3

  json_serializable: ^6.3.1
  faker: ^2.0.0
  drift_dev: ^2.1.0

  flutter_launcher_icons: "^0.10.0"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/logos/
    - assets/images/icons/
    - assets/db/init.sqlite3

  fonts:
    - family: bangla/solaimanlipi
      fonts:
        - asset: assets/fonts/solaimanlipi.ttf

    - family: bangla/siyamrupali
      fonts:
        - asset: assets/fonts/siyamrupali.ttf

    - family: bangla/kalpurush
      fonts:
        - asset: assets/fonts/kalpurush.ttf

    - family: arabic/al-qalam
      fonts:
        - asset: assets/fonts/al-qalam-quran-majeed.ttf

    - family: arabic/al-qalam-kolkatta
      fonts:
        - asset: assets/fonts/al-qalam-kolkatta-quranic-regular.ttf

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logos/logo-icon.png"
