name: native_app
description: Islami Jindegi Native App

publish_to: 'none'

version: 5.1.7+137

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # application
  flutter_dotenv: ^5.0.2

  # state management
  flutter_riverpod: ^2.3.10

  # routing
  qlevar_router: ^1.10.3

  # data
  flutter_data: ^1.6.0
  flutter_data_json_api_adapter:
    git:
      url: https://github.com/flutterdata/flutter_data_json_api_adapter.git
      ref: 5af6c88
  isar_community: 3.2.0-dev.4
  isar_community_flutter_libs: 3.2.0-dev.4
  equatable: ^2.0.5

  # local db
  drift: ^2.10.0
  sqlite3_flutter_libs: ^0.5.13
  json_api: ^7.0.1

  # form
  date_field: ^4.0.1
  dropdown_button2: ^2.3.9
  idkit_inputformatters: ^0.0.1
  easy_debounce: ^2.0.3

  # widgets
  infinite_scroll_pagination: ^4.0.0
  scrollable_positioned_list: ^0.3.8
  carousel_slider: ^5.0.0
  animated_toggle_switch: ^0.8.0
  just_audio: ^0.9.40
  # just_audio_background: ^0.0.1-beta.11
  pdfrx: ^1.0.90

  # text
  intl: ^0.19.0
  flutter_localizations:
    sdk: flutter
  flutter_html: '^3.0.0-beta.2'
  flutter_html_table: ^3.0.0-beta.2
  inflection3: ^0.5.3+2
  recase: ^4.1.0
  html: ^0.15.2

  # platform
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  connectivity_plus: ^6.1.2
  open_filex: ^4.6.0
  share_plus: ^10.1.4
  wakelock_plus: ^1.2.10
  flutter_alarm_clock: ^0.1.2
  webview_flutter: ^4.8.0

  # http
  dio: ^5.3.2
  url_launcher: ^6.3.1
  lehttp_overrides: ^1.0.3

  # builder
  json_annotation: ^4.7.0

  # utility
  path: '^1.9.0'
  glob: ^2.1.2

  # extensions
  collection: ^1.16.0

  # islamic
  hijri: ^3.0.0
  hijri_picker:
    git:
      url: https://github.com/musaffa/hijri_picker.git
      ref: pass-weekday-number
  adhan: ^2.0.0-nullsafety.2
  timezone_utc_offset: ^1.1.0
  date_picker_plus: ^4.1.0
  flutter_compass: ^0.8.1

  # app widget
  home_widget: ^0.6.0
  workmanager: ^0.5.1

  # firebase
  firebase_core: ^3.10.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0

  # assets
  flutter_svg: ^2.0.7
  cached_network_image: ^3.2.3
  transparent_image: ^2.0.0
  flutter_native_splash: ^2.3.2
  flutter_screenutil: ^5.9.3
  sqflite_common_ffi: ^2.3.4+4
  google_fonts: ^6.3.0
  archive: ^4.0.7
  sqflite: ^2.4.1
  hugeicons: ^0.0.8
  scroll_to_index: ^3.0.1
  quran_flutter: ^1.0.3

  # flutter_gen: any

dependency_overrides:
  # flutter_data and isar_community_generator conflicts
  source_gen: ^1.0.1
  dart_style: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

  build_runner: ^2.4.13
  isar_community_generator: 3.2.0-dev.4

  json_serializable: ^6.3.1
  faker: ^2.0.0
  drift_dev: ^2.10.0

  flutter_launcher_icons: "^0.13.1"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/image/
    - assets/image/front_page/
    - assets/images/logos/
    - assets/images/background/
    - assets/images/icons/
    - assets/images/books/
    - assets/images/quran-qitabs/
    - assets/audios/0.mp3
    - assets/db/offline_data_15.sqlite3
    - assets/db/offline_location_2.sqlite3

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

    - family: bangla/solaimanlipi
      fonts:
        - asset: assets/fonts/solaimanlipi.ttf

    - family: bangla/siyamrupali
      fonts:
        - asset: assets/fonts/siyamrupali.ttf

    - family: bangla/kalpurush
      fonts:
        - asset: assets/fonts/kalpurush.ttf

    - family: bangla/noto-sans-bengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
          weight: 700

    - family: bangla/ben-sen-handwriting
      fonts:
        - asset: assets/fonts/BenSenHandwriting.ttf

    - family: arabic/al-qalam-quran-majeed
      fonts:
        - asset: assets/fonts/al-qalam-quran-majeed.ttf

    - family: arabic/al-qalam-kolkatta
      fonts:
        - asset: assets/fonts/al-qalam-kolkatta-quranic-regular.ttf

    - family: arabic/al-mushaf
      fonts:
        - asset: assets/fonts/al-mushaf-quran.ttf

    - family: arabic/al-qalam-quran
      fonts:
        - asset: assets/fonts/al-qalam-quran.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/logos/logo-icon.png

flutter_native_splash:
  color: "#004b44"
  image: assets/images/logos/logo-transparent.png
  web: false

  android_12:
    image: assets/images/logos/logo-transparent-android-12.png
