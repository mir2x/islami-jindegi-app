workflows:
  ios-release:
    name: iOS Release to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Islami Jindegi
    environment:
      flutter: 3.27.4
      xcode: latest
      cocoapods: default
      groups:
        - app_credentials
    scripts:
      - name: Create .env file
        script: echo "$ENV_FILE" > .env

      - name: Set up code signing
        script: |
          keychain initialize

          # Generate a fresh private key for the distribution certificate
          openssl genrsa -out /tmp/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)

          # Fetch or create signing files using the new key
          app-store-connect fetch-signing-files \
            "com.topofstacksoftware.IslamiJindegi" \
            --type IOS_APP_STORE \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create

          keychain add-certificates

      - name: Set up Xcode project settings
        script: xcode-project use-profiles

      - name: Install dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
