workflows:
  ios-release:
    name: iOS Release to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.27.4
      xcode: latest
      cocoapods: default
      groups:
        - app_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.topofstacksoftware.IslamiJindegi
    scripts:
      - name: Create .env file
        script: echo "$ENV_FILE" > .env

      - name: Install dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
